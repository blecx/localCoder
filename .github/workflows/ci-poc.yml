name: PoC CI

on:
  push:
    paths:
      - "poc/**"
  pull_request:
    paths:
      - "poc/**"

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check poc/

  compose-validate:
    name: Validate docker-compose
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose file syntax
        run: docker compose -f poc/docker-compose.yml config --quiet
